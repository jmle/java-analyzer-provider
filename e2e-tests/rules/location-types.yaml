# Location Types Test Rules
# One rule per location type to verify all 15 location types work

# 1. TYPE
- ruleID: location-type-TYPE
  message: "TYPE location test: {{name}} found at {{file}}:{{lineNumber}}"
  when:
    java.referenced:
      pattern: "*CustomResourceDefinition*"
      location: TYPE
  category: mandatory
  effort: 1

# 2. IMPORT
- ruleID: location-type-IMPORT
  message: "IMPORT location test: {{name}}"
  when:
    java.referenced:
      pattern: org.springframework.web.servlet.ViewResolver
      location: IMPORT
  category: mandatory
  effort: 1

# 3. PACKAGE
- ruleID: location-type-PACKAGE
  message: "PACKAGE location test: {{name}}"
  when:
    java.referenced:
      pattern: org.springframework.web.servlet
      location: PACKAGE
  category: mandatory
  effort: 1

# 4. VARIABLE_DECLARATION
- ruleID: location-type-VARIABLE_DECLARATION
  message: "VARIABLE_DECLARATION location test: {{name}}"
  when:
    java.referenced:
      pattern: "*"
      location: VARIABLE_DECLARATION
  category: mandatory
  effort: 1

# 5. FIELD
- ruleID: location-type-FIELD
  message: "FIELD location test: {{name}}"
  when:
    java.referenced:
